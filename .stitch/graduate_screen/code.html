<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0c0e14;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .accent-glow {
            background: radial-gradient(circle at center, rgba(176, 138, 158, 0.08) 0%, rgba(12, 14, 20, 0) 70%);
        }
        .text-editorial-body {
            line-height: 1.6;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface text-on-surface overflow-hidden">
<!-- Graduate Screen: Full Screen Takeover -->
<main class="relative h-screen w-full flex flex-col items-center justify-center px-8">
<!-- Subtle Accent Glow Background -->
<div class="absolute inset-0 accent-glow pointer-events-none"></div>
<!-- The Pulse Indicator: Signature Component -->
<div class="mb-12 relative">
<div class="w-32 h-32 rounded-full bg-primary/20 flex items-center justify-center">
<div class="w-16 h-16 rounded-full bg-primary shadow-[0_0_40px_rgba(176,138,158,0.3)]"></div>
</div>
</div>
<!-- Content Canvas -->
<div class="w-full max-w-[720px] text-center space-y-8 z-10">
<div class="space-y-3">
<h1 class="text-3xl md:text-4xl font-semibold tracking-tight text-on-surface">
                    This one's yours now.
                </h1>
<p class="text-on-surface-variant font-medium tracking-wide uppercase text-sm opacity-60">
                    Deep Focus Cycle
                </p>
</div>
<div class="pt-12 w-full max-w-md mx-auto">
<div class="relative group">
<label class="block text-left text-xs font-medium text-on-surface-variant mb-4 opacity-50 tracking-widest uppercase" for="reflection">
                        Optional reflection
                    </label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant/30 py-4 text-lg focus:ring-0 focus:border-primary transition-all duration-500 placeholder:text-on-surface-variant/40 placeholder:font-light" id="reflection" placeholder="What does that feel like?" type="text"/>
<div class="text-left mt-2">
<span class="text-[10px] text-on-surface-variant/40 italic">(no pressure)</span>
</div>
</div>
</div>
<div class="pt-16">
<!-- Secondary Button: Done (Ghost Style per Design System) -->
<button class="px-12 py-3 text-primary font-semibold hover:text-on-primary-container transition-all duration-300 text-sm tracking-widest uppercase">
                    Done
                </button>
</div>
</div>
<!-- Footnote Style Visual Anchor (Non-Functional) -->
<div class="absolute bottom-12 text-[11px] text-on-surface-variant/30 uppercase tracking-[0.2em]">
            Recognition &amp; Awareness
        </div>
</main>
<!-- Navigation suppression applied for focused journey (Graduate Screen) -->
<!-- Navigation logic: Hidden to prioritize the content canvas per "Shell Visibility & Relevance" rule -->
</body></html>
