<body class="bg-surface text-on-surface flex items-center justify-center min-h-screen selection:bg-primary/30">
<!-- Progress Indicator - Minimal Top Alignment -->
<div class="fixed top-12 left-0 w-full flex justify-center gap-3">
<div class="w-1.5 h-1.5 rounded-full bg-primary shadow-[0_0_8px_rgba(229,187,208,0.6)]"></div>
<div class="w-1.5 h-1.5 rounded-full bg-surface-container-highest"></div>
<div class="w-1.5 h-1.5 rounded-full bg-surface-container-highest"></div>
</div>
<!-- Main Content Canvas -->
<main class="w-full max-w-[720px] px-8 py-24 flex flex-col items-start">
<!-- Subtle Ambient Glow Background Decorative Element -->
<div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[400px] h-[400px] bg-primary/5 blur-[120px] rounded-full pointer-events-none"></div>
<!-- Question Header -->
<section class="mb-16 animate-fade-in">
<span class="text-on-surface-variant text-[12px] font-medium tracking-[0.2em] uppercase mb-6 block opacity-60">Step 01</span>
<h2 class="text-[32px] md:text-[40px] font-semibold leading-tight tracking-[-0.02em] text-on-surface">
                How is your energy right now?
            </h2>
</section>
<!-- Response Scale (Single Column Pilled Layout) -->
<div class="w-full space-y-4">
<!-- Alive (High Contrast Selection Example) -->
<button class="w-full group relative flex items-center justify-between p-6 rounded-xl transition-all duration-300 bg-primary/10 border border-primary/40 editorial-shadow">
<span class="text-[15px] font-medium text-primary tracking-wide">Alive</span>
<span class="material-symbols-outlined text-primary text-xl">colors_spark</span>
<div class="absolute inset-0 bg-primary/5 rounded-xl blur-md opacity-0 group-hover:opacity-100 transition-opacity"></div>
</button>
<!-- Good -->
<button class="w-full group flex items-center justify-between p-6 rounded-xl transition-all duration-300 bg-surface-container hover:bg-surface-container-high ghost-border border-transparent">
<span class="text-[15px] font-medium text-on-surface-variant group-hover:text-on-surface tracking-wide">Good</span>
<span class="material-symbols-outlined text-on-surface-variant opacity-40 group-hover:opacity-100 text-xl">light_mode</span>
</button>
<!-- Okay -->
<button class="w-full group flex items-center justify-between p-6 rounded-xl transition-all duration-300 bg-surface-container hover:bg-surface-container-high ghost-border border-transparent">
<span class="text-[15px] font-medium text-on-surface-variant group-hover:text-on-surface tracking-wide">Okay</span>
<span class="material-symbols-outlined text-on-surface-variant opacity-40 group-hover:opacity-100 text-xl">cloud</span>
</button>
<!-- Low -->
<button class="w-full group flex items-center justify-between p-6 rounded-xl transition-all duration-300 bg-surface-container hover:bg-surface-container-high ghost-border border-transparent">
<span class="text-[15px] font-medium text-on-surface-variant group-hover:text-on-surface tracking-wide">Low</span>
<span class="material-symbols-outlined text-on-surface-variant opacity-40 group-hover:opacity-100 text-xl">air</span>
</button>
<!-- Very Low -->
<button class="w-full group flex items-center justify-between p-6 rounded-xl transition-all duration-300 bg-surface-container hover:bg-surface-container-high ghost-border border-transparent">
<span class="text-[15px] font-medium text-on-surface-variant group-hover:text-on-surface tracking-wide">Very Low</span>
<span class="material-symbols-outlined text-on-surface-variant opacity-40 group-hover:opacity-100 text-xl">bedtime</span>
</button>
</div>
<!-- Pulse Indicator Footer (Contextual Signature Component) -->
<div class="mt-24 w-full flex flex-col items-center justify-center opacity-40">
<div class="w-2 h-2 rounded-full bg-primary/60 animate-pulse mb-4"></div>
<p class="text-[12px] font-medium text-on-surface-variant tracking-[0.1em] uppercase">Just notice without judgment</p>
</div>
</main>
<!-- Close/Exit Action -->
<button class="fixed top-12 right-8 w-10 h-10 flex items-center justify-center rounded-full bg-surface-container hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-on-surface-variant text-xl">close</span>
</button>
