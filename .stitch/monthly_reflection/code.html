<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .mauve-glow {
            background: radial-gradient(circle at center, rgba(229, 187, 208, 0.08) 0%, rgba(12, 14, 20, 0) 70%);
        }
        .editor-line {
            background-image: linear-gradient(to right, rgba(165, 170, 192, 0.1) 1px, transparent 1px);
            background-size: 100% 2.4rem;
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface text-on-surface min-h-screen selection:bg-primary/30">
<!-- Top Navigation (Shell) -->
<nav class="fixed top-0 w-full z-50 bg-slate-950/60 backdrop-blur-xl">
<div class="flex justify-between items-center px-8 py-6 max-w-screen-xl mx-auto">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-fuchsia-300" data-icon="notes">notes</span>
<span class="text-xl font-bold tracking-tighter text-fuchsia-200">Cycle</span>
</div>
<div class="hidden md:flex gap-8 text-sm leading-relaxed tracking-tight font-semibold">
<a class="text-slate-400 font-normal hover:text-fuchsia-200 transition-colors duration-300" href="#">Dashboard</a>
<a class="text-slate-400 font-normal hover:text-fuchsia-200 transition-colors duration-300" href="#">Patterns</a>
<a class="text-fuchsia-300 font-semibold transition-colors duration-300" href="#">Reflections</a>
</div>
</div>
</nav>
<!-- Main Canvas -->
<main class="relative min-h-screen flex flex-col items-center justify-center px-6 pt-24 pb-32 overflow-hidden">
<!-- Subtle Mauve Glow -->
<div class="absolute inset-0 mauve-glow pointer-events-none"></div>
<!-- Reflection Container -->
<div class="w-full max-w-[720px] relative z-10 flex flex-col gap-12">
<!-- Context & Header -->
<header class="flex flex-col gap-4 items-start">
<div class="flex items-center gap-2 px-3 py-1 rounded-full bg-surface-container-high/50 border border-outline-variant/20">
<span class="w-2 h-2 rounded-full bg-primary shadow-[0_0_8px_rgba(229,187,208,0.6)]"></span>
<span class="text-[10px] font-semibold tracking-widest uppercase text-on-surface-variant">Monthly Reflection • April</span>
</div>
<h2 class="text-[28px] md:text-[32px] font-semibold tracking-tight text-on-surface leading-tight max-w-[580px]">
                    What's one thing you now know about yourself that you didn't before?
                </h2>
</header>
<!-- Editorial Text Area -->
<section class="group relative">
<div class="absolute -inset-x-4 -inset-y-4 bg-surface-container/30 rounded-2xl blur-xl opacity-0 group-focus-within:opacity-100 transition-opacity duration-700 pointer-events-none"></div>
<textarea class="w-full min-h-[400px] bg-transparent border-none focus:ring-0 text-[18px] md:text-[20px] leading-[1.8] text-on-surface placeholder:text-on-surface-variant/30 resize-none font-body py-4 block" placeholder="Begin your thought here..."></textarea>
<!-- Subtle Interaction Detail: The Pulse Indicator -->
<div class="mt-8 flex items-center gap-6">
<div class="h-[1px] flex-grow bg-gradient-to-r from-outline-variant/40 to-transparent"></div>
<div class="flex items-center gap-3">
<span class="text-[12px] font-medium text-on-surface-variant/60 uppercase tracking-[0.2em]">Flow State</span>
<div class="w-3 h-3 rounded-full bg-primary/40 flex items-center justify-center">
<div class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"></div>
</div>
</div>
</div>
</section>
<!-- Actions -->
<footer class="flex items-center justify-between pt-4">
<div class="flex gap-4">
<button class="text-secondary font-medium text-sm hover:text-on-surface transition-colors px-4 py-2 rounded-lg">
                        Discard
                    </button>
</div>
<button class="px-10 py-4 bg-primary text-on-primary font-semibold rounded-xl text-sm tracking-wide shadow-xl shadow-primary/10 hover:shadow-primary/20 hover:scale-[1.02] transition-all duration-300">
                    Save Reflection
                </button>
</footer>
</div>
</main>
<!-- Bottom Navigation (Shell) -->
<nav class="fixed bottom-0 left-0 w-full h-20 flex justify-around items-center px-6 pb-4 bg-slate-950/80 backdrop-blur-2xl rounded-t-2xl z-50 shadow-2xl shadow-black/40 tonal layering bg-slate-900/60">
<a class="flex flex-col items-center justify-center text-slate-500 opacity-60 hover:opacity-100 transition-all duration-300" href="#">
<span class="material-symbols-outlined mb-1" data-icon="grid_view">grid_view</span>
<span class="font-plus-jakarta text-[11px] font-medium tracking-wide uppercase">Dashboard</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 opacity-60 hover:opacity-100 transition-all duration-300" href="#">
<span class="material-symbols-outlined mb-1" data-icon="waves">waves</span>
<span class="font-plus-jakarta text-[11px] font-medium tracking-wide uppercase">Patterns</span>
</a>
<a class="flex flex-col items-center justify-center text-fuchsia-300 scale-110 active:tap-highlight-none transition-all duration-300" href="#">
<span class="material-symbols-outlined mb-1" data-icon="edit_note" data-weight="fill" style="font-variation-settings: 'FILL' 1;">edit_note</span>
<span class="font-plus-jakarta text-[11px] font-medium tracking-wide uppercase">Reflections</span>
</a>
</nav>
